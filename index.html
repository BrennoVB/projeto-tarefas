<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Profissional</title>
    <link rel="stylesheet" href="estilos/style.css">
</head>
<body>
    <h1 id=>Dashboard de Tarefas com Estatísticas</h1>

    <div id="estatistica">
        <h2>Estatísticas</h2>

        <div id="estatistica-total">
            Total:
        </div>

        <div id="estatistica-pendentes">
            Pendentes:
        </div>

        <div id="estatistica-concluidas">
            Concluídas:
        </div>
    </div>


    <div id="area-formulario">
        <label for="ititulo">Titulo da tarefa: </label>
        <input type="text" name="titulo" id="ititulo">
        <fieldset>
            <legend>Tipo de Prioridade:</legend>
        
            <input type="radio" name="prioridade" id="iprioridade-alta" value="alta">
            <label for="iprioridade-alta">Alta</label>
        
            <input type="radio" name="prioridade" id="iprioridade-media" value="media">
            <label for="iprioridade-media">Média</label>
        
            <input type="radio" name="prioridade" id="iprioridade-baixa" value="baixa">
            <label for="iprioridade-baixa">Baixa</label>
        </fieldset>
        <button id="btn-adicionar">
            Adicionar
        </button>
    </div>
    

    <div id="area-de-filtros">
        <h2>Filtro</h2>

        <button id="btn-todas" class="btn-filtro">Todas</button>

        <button id="btn-pendentes" class="btn-filtro">Pendentes</button>
        
        <button id="btn-concluidas" class="btn-filtro">Concluídas</button>

        <button id="btn-alta" class="btn-filtro">Alta</button>

        <button id="btn-media" class="btn-filtro">Média</button>

        <button id="btn-baixa" class="btn-filtro">Baixa</button>
    </div>

    <div id="mostrar-tarefas">

    </div>

    <script src="scripts/script.js"></script>
</body>
</html>
