<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Profissional</title>
    <link rel="stylesheet" href="estilos/style.css">
</head>
<body>
    <h1>Dashboard de Tarefas com Estatísticas</h1>

    <div id="estatistica">
        <h2>Estatísticas</h2>

        <div id="estatistica-total">
            Total:
        </div>

        <div id="estatistica-pendentes">
            Pendentes:
        </div>

        <div id="estatisticas-concluidas">
            Concluídas:
        </div>
    </div>


    <label for="ititulo">Titulo da tarefa: </label>
    <input type="text" name="titulo" id="ititulo">

    <fieldset>
        <legend>Tipo de Prioridade:</legend>
        
        <input type="radio" name="prioridade" id="iprioridade-alta" value="alta"> 
        <label for="iprioridade-alta">Alta</label> 
        
        <input type="radio" name="prioridade" id="iprioridade-media" value="media"> 
        <label for="iprioridade-media">Média</label> 
        
        <input type="radio" name="prioridade" id="iprioridade-baixa" value="baixa"> 
        <label for="iprioridade-baixa">Baixa</label>
    </fieldset>


    <button id="btn-adicionar">
        Adicionar  
    </button>
    

    <div id="area-de-filtros">
        <h2>Filtro</h2>

        <button id="btn-todas">Todas</button>

        <button id="btn-pendentes">Pendentes</button>
        
        <button id="btn-concluidas">Concluídas</button>

        <button id="btn-alta">Alta</button>

        <button id="btn-media">Média</button>

        <button id="btn-baixa">Baixa</button>
    </div>

    <div id="mostrar-tarefas">

    </div>

    <script src="scripts/script.js"></script>
</body>
</html>
